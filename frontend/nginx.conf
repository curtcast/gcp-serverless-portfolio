server {
    listen 8080;
    server_name localhost;

    # 🟢 CRUCIAL FIX: Define root here so the entire file can see it
    root /usr/share/nginx/html; 
    index index.html index.htm;

    location / {
        # (Removed root from here)
        try_files $uri $uri/ =404; 

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires -1;
    }

    # Route broken paths to your custom page
    error_page 404 /404.html;
    location = /404.html {
        # This block now perfectly inherits the global root above
        internal;
    }

    # Redirect server error pages to the static page /50x.html
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        # (Inherits global root seamlessly)
    }
}

